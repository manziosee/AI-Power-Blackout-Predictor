version: "3.9"
# Production overrides — layer on top of docker-compose.yml

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []    # no volume mount in prod — use baked image

  frontend:
    build:
      target: production
    command: nginx -g "daemon off;"
    volumes: []

  sms-gateway:
    volumes: []

  ml-engine:
    volumes: []

  data-pipeline:
    volumes: []

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro   # SSL certificates
