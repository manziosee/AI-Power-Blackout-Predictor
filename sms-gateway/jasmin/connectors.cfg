# Jasmin SMPP Connector configuration — global template
#
# Each [section] maps to one SMPP connection.
# Set the environment variables listed below in your .env file (or docker-compose).
# Add as many connectors as you need — one per operator or aggregator.
#
# Jasmin CLI equivalent:
#   jasmin-cli> smppccm -a
#   > cid  <connector_id>
#   > host <smpp_host>
#   > port <smpp_port>
#   > username <username>
#   > password <password>
#   > submit_throughput 10
#   > ok
#
# Route all outbound traffic through the default connector:
#   jasmin-cli> mtrouter -a
#   > type DefaultRoute
#   > connector smppc/default
#   > rate 0
#   > ok
#
# ── Default / fallback connector ────────────────────────────────────────────
# Use this with any global SMPP aggregator (e.g. Sinch, Twilio SMPP,
# Vonage, Infobip, or your local telecom's SMPP endpoint).
[default]
cid                = default
host               = ${SMPP_HOST}
port               = ${SMPP_PORT}
username           = ${SMPP_USERNAME}
password           = ${SMPP_PASSWORD}
submit_throughput  = 20
src_addr           = BLACKOUT
src_addr_ton       = 5
src_addr_npi       = 0

# ── Optional: second connector (e.g. higher-throughput aggregator) ──────────
# Uncomment and fill in if you have a second SMPP account.
#
# [aggregator2]
# cid               = aggregator2
# host              = ${SMPP2_HOST}
# port              = ${SMPP2_PORT}
# username          = ${SMPP2_USERNAME}
# password          = ${SMPP2_PASSWORD}
# submit_throughput = 50

# ── USSD connector (if your aggregator provides a separate USSD SMPP) ───────
# Most AT/Infobip accounts share one SMPP endpoint for both SMS and USSD.
# Only add this section if you have a dedicated USSD SMPP bind.
#
# [ussd]
# cid               = ussd
# host              = ${USSD_SMPP_HOST}
# port              = ${USSD_SMPP_PORT}
# username          = ${USSD_SMPP_USERNAME}
# password          = ${USSD_SMPP_PASSWORD}
# submit_throughput = 5
