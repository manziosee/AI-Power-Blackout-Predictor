# Jasmin SMPP Connector definitions
# These are loaded via Jasmin CLI on startup.
# In production, use the Jasmin CLI or REST management API to provision connectors.
#
# Example CLI commands to create the MTN Rwanda connector:
#
#   jasmin-cli> smppccm -a
#   > cid mtn_rw
#   > host smpp.mtn.co.rw
#   > port 2775
#   > username YOUR_USERNAME
#   > password YOUR_PASSWORD
#   > systype
#   > logfile /var/log/jasmin/mtn_rw.log
#   > submit_throughput 10
#   > ok
#
# Repeat for airtel_rw, safaricom_ke, fallback_aggregator using their SMPP credentials.
#
# Router configuration — route all traffic through the default connector:
#   jasmin-cli> mtrouter -a
#   > type DefaultRoute
#   > connector smppc/mtn_rw
#   > rate 0
#   > ok

[mtn_rw]
cid = mtn_rw
host = ${MTN_RW_SMPP_HOST}
port = ${MTN_RW_SMPP_PORT}
username = ${MTN_RW_SMPP_USERNAME}
password = ${MTN_RW_SMPP_PASSWORD}
submit_throughput = 10

[airtel_rw]
cid = airtel_rw
host = ${AIRTEL_RW_SMPP_HOST}
port = ${AIRTEL_RW_SMPP_PORT}
username = ${AIRTEL_RW_SMPP_USERNAME}
password = ${AIRTEL_RW_SMPP_PASSWORD}
submit_throughput = 10

[fallback_aggregator]
cid = fallback_aggregator
host = ${FALLBACK_SMPP_HOST}
port = ${FALLBACK_SMPP_PORT}
username = ${FALLBACK_SMPP_USERNAME}
password = ${FALLBACK_SMPP_PASSWORD}
submit_throughput = 30
