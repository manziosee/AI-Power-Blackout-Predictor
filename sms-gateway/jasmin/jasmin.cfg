[jasmin]
# Jasmin SMS Gateway main configuration

[smpp-client-manager]
# SMPP client manager settings
port = 8990

[http-api]
# Jasmin HTTP API
enable = 1
port = 8080
long_content_max_parts = 5
long_content_split = udh

[amqp-broker]
host = rabbitmq
port = 5672
vhost = /
username = guest
password = guest
heartbeat = 300

[dlr]
# Delivery receipt configuration
expiry = 86400
