# Default values for blackout-predictor.
# Override in your values file or with --set flags.

replicaCount: 2

image:
  repository: ghcr.io/manziosee/ai-power-blackout-predictor/backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: api.blackoutpredictor.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: blackout-tls
      hosts:
        - api.blackoutpredictor.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Application environment variables
env:
  ENVIRONMENT: "production"
  METRICS_ENABLED: "true"
  OTEL_ENABLED: "false"

# Reference to a Kubernetes Secret containing sensitive env vars:
#   DATABASE_URL, SYNC_DATABASE_URL, REDIS_URL, SECRET_KEY, etc.
envFromSecret: ""

# Liveness / readiness
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

# ML Engine sidecar (optional — enable if deploying ml-engine in same pod)
mlEngine:
  enabled: false
  image:
    repository: ghcr.io/manziosee/ai-power-blackout-predictor/ml-engine
    tag: "latest"
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
