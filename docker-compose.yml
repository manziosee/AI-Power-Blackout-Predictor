version: "3.9"

services:
  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: blackout_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blackout_predictor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blackout_redis
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (for Jasmin) ────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blackout_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackout_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/blackout_predictor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SMS_GATEWAY_URL: http://sms-gateway:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackout_celery
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/blackout_predictor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SMS_GATEWAY_URL: http://sms-gateway:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackout_beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/blackout_predictor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ── Jasmin SMS Gateway ───────────────────────────────────────────────────────
  jasmin:
    image: jookies/jasmin:latest
    container_name: blackout_jasmin
    ports:
      - "2775:2775"   # SMPP
      - "8080:8080"   # HTTP API
      - "8990:8990"   # CLI
    volumes:
      - ./sms-gateway/jasmin/jasmin.cfg:/etc/jasmin/jasmin.cfg
      - jasmin_data:/etc/jasmin/store
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_BROKER_HOST: rabbitmq

  # ── SMS Gateway API ──────────────────────────────────────────────────────────
  sms-gateway:
    build:
      context: ./sms-gateway
      dockerfile: Dockerfile
    container_name: blackout_sms
    env_file: .env
    environment:
      JASMIN_HOST: jasmin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8001:8001"
    depends_on:
      - jasmin
    volumes:
      - ./sms-gateway:/app

  # ── ML Engine ────────────────────────────────────────────────────────────────
  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: blackout_ml
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/blackout_predictor
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml-engine:/app

  # ── Data Pipeline ────────────────────────────────────────────────────────────
  data-pipeline:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: blackout_pipeline
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/blackout_predictor
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data-pipeline:/app

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackout_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: blackout_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
      - sms-gateway

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  jasmin_data:
